spring:
  application:
    name: cs-agent-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/csagent}
    username: ${DB_USERNAME:csagent}
    password: ${DB_PASSWORD:csagent}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

# 애플리케이션 커스텀 설정
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-please-use-env}
    expiration-hours: 8
  auth:
    max-failed-login: 5
  bedrock:
    region: ${AWS_REGION:us-east-1}
    # 검증된 inference profile (최신 sonnet). on-demand 대체: anthropic.claude-3-haiku-20240307-v1:0
    model-id: ${BEDROCK_MODEL_ID:us.anthropic.claude-sonnet-4-6}
    timeout-seconds: 120          # 재시도 시 점증: 120 -> 180 -> 240
    max-retries: 3
  ai:
    # local 프로파일에서는 MockLlmClient 사용
    llm-client: ${LLM_CLIENT:bedrock}   # bedrock | mock
  draft:
    max-regeneration: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
